<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"/>
  <title>GameCorner</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="GameCorner"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <meta name="theme-color" content="#1e1e2e"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#1e1e2e; --surface:#2a2a3e; --border:#44475a;
      --text:#cdd6f4; --sub:#6c7086; --accent:#89b4fa;
      --green:#a6e3a1; --red:#f38ba8; --yellow:#f9e2af; --purple:#cba6f7;
    }
    html, body {
      height:100%; background:var(--bg); color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      -webkit-tap-highlight-color:transparent;
      padding-top:env(safe-area-inset-top);
      padding-bottom:env(safe-area-inset-bottom);
    }
    #app {
      display:flex; flex-direction:column; align-items:center;
      min-height:100%; padding:24px 16px;
    }
    header {
      text-align:center; margin-bottom:32px;
    }
    h1 {
      font-size:36px; font-weight:800; letter-spacing:2px;
      background:linear-gradient(135deg, var(--accent), var(--purple));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text; margin-bottom:8px;
    }
    .tagline {
      font-size:14px; color:var(--sub); letter-spacing:1px; text-transform:uppercase;
    }

    /* Credits display */
    .credits-widget {
      display:flex; align-items:center; gap:12px;
      background:var(--surface); border:1px solid var(--border);
      border-radius:16px; padding:10px 20px; margin-bottom:40px;
    }
    .credits-label { font-size:12px; color:var(--sub); text-transform:uppercase; letter-spacing:1px; }
    .credits-pips { display:flex; gap:6px; }
    .pip {
      width:20px; height:20px; border-radius:50%;
      background:var(--purple); border:2px solid var(--purple);
    }
    .pip.empty { background:transparent; border-color:var(--border); }
    .credits-count { font-size:16px; font-weight:800; color:var(--purple); min-width:70px; text-align:right; }

    /* Game grid */
    .games-grid {
      display:grid; grid-template-columns:repeat(2, 1fr);
      gap:20px; max-width:500px; width:100%;
    }

    .game-card {
      background:var(--surface); border:2px solid var(--border);
      border-radius:20px; padding:24px 20px;
      display:flex; flex-direction:column; align-items:center;
      gap:12px; cursor:pointer; transition:all 0.2s;
      text-decoration:none; color:var(--text);
    }
    .game-card:hover, .game-card:active {
      transform:translateY(-4px);
      border-color:var(--accent);
      box-shadow:0 8px 24px rgba(137,180,250,0.2);
    }
    .game-icon {
      font-size:64px; line-height:1;
    }
    .game-name {
      font-size:18px; font-weight:700; text-align:center;
    }
    .game-desc {
      font-size:12px; color:var(--sub); text-align:center; line-height:1.4;
    }

    footer {
      margin-top:auto; padding-top:40px;
      font-size:11px; color:var(--sub); text-align:center;
    }

    @media (max-width: 400px) {
      .games-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <h1>🎮 GameCorner</h1>
    <div class="tagline">Play • Compete • Have Fun</div>
  </header>

  <div class="credits-widget">
    <div>
      <div class="credits-label">⚡ Credits</div>
      <div class="credits-pips" id="pips"></div>
    </div>
    <div class="credits-count" id="credits-count"></div>
  </div>

  <div class="games-grid">
    <a href="minesweeper.html" class="game-card">
      <div class="game-icon">💣</div>
      <div class="game-name">Minesweeper</div>
      <div class="game-desc">Classic mine-dodging puzzle with lifelines</div>
    </a>

    <a href="tictactoe.html" class="game-card">
      <div class="game-icon">❌⭕</div>
      <div class="game-name">Tic-Tac-Toe</div>
      <div class="game-desc">Challenge the AI with hint lifelines</div>
    </a>
  </div>

  <footer>
    GameCorner © 2026 • All games share credits
  </footer>
</div>

<script>
const MAX_CREDITS = 5;

function loadCredits() {
  const stored = parseInt(localStorage.getItem('ms_credits'));
  return isNaN(stored) ? MAX_CREDITS : Math.min(stored, MAX_CREDITS);
}

function renderCredits() {
  const credits = loadCredits();
  const pipsEl = document.getElementById('pips');
  const countEl = document.getElementById('credits-count');

  pipsEl.innerHTML = '';
  for (let i=0; i<MAX_CREDITS; i++) {
    const pip = document.createElement('div');
    pip.className = 'pip' + (i < credits ? '' : ' empty');
    pipsEl.appendChild(pip);
  }
  countEl.textContent = `${credits} / ${MAX_CREDITS}`;
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
renderCredits();

// Refresh credits when page becomes visible (in case credits changed in another game)
document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) renderCredits(); });
</script>
</body>
</html>
